<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GLU Stream — PC Party Rail (Compact / Etched Glass)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@200..800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   GL UNIVERSE — STREAM OVERLAY · PC PARTY (compact horizontal)
   Direction: big character art + a compact horizontal stat plate
   anchored to it (class tab, name pill, HP/AC/abilities band,
   spell strip, player token). Etched Glass material throughout.
   Mockup: fake PF2e data + simulated live updates.
   ============================================================ */
:root{
  --gl-ink-0:#02070b; --gl-ink-1:#080b11; --gl-ink-2:#0b0f17; --gl-ink-3:#161d2c;
  --gl-text:#eef1f7; --gl-text-bright:#f3fbff; --gl-text-dim:#98a2b6; --gl-text-faint:rgba(243,251,255,.42);
  --gl-hair:rgba(255,255,255,.08); --gl-edge:rgba(255,255,255,.13); --gl-line-strong:rgba(244,252,255,.55);
  --gl-signal:#ffd24a; --gl-signal-hot:#ffe070; --gl-cyan:#5eeaff; --gl-hazard:#ff4a52;
  --gl-good:#5fdb92; --gl-violet:#b497ff; --gl-mission:#37d99a;
  --gl-display:"Oxanium","Segoe UI",system-ui,sans-serif;
  --gl-tech:"Bahnschrift","JetBrains Mono","Share Tech Mono",Consolas,monospace;
  --gl-ease:cubic-bezier(.16,1,.3,1); --gl-snap:cubic-bezier(.2,1.35,.22,1);
  --gl-pop:cubic-bezier(.34,1.56,.5,1); --gl-exit:cubic-bezier(.55,0,.84,0);
}
html,body{height:100%;margin:0}
body{font-family:var(--gl-display);color:var(--gl-text);-webkit-font-smoothing:antialiased;overflow:hidden;
  background:
    radial-gradient(1000px 560px at 24% 14%, #243a5e, transparent 60%),
    radial-gradient(900px 560px at 82% 82%, #41204c, transparent 62%),
    linear-gradient(160deg,#0c1018,#05080d);
  display:flex;align-items:flex-end;justify-content:center}
body.is-transparent{background:conic-gradient(#1b1f27 25%,#20242d 0 50%,#1b1f27 0 75%,#20242d 0) 0 0/40px 40px}

/* ===== party rail — the placeable group ===== */
.rail{display:flex;gap:10px;align-items:flex-end;padding:0 26px 30px;margin:0 auto}

/* ===== one PC unit: art behind + compact plate ===== */
.unit{position:relative;width:432px;padding-top:150px;animation:unitIn .6s var(--gl-ease) backwards}
@keyframes unitIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
.unit{--gl-accent:#6fb8d8}

/* --- diorama art: big, bleeds up behind the plate --- */
.art{position:absolute;left:18px;right:18px;top:0;height:300px;z-index:1;overflow:hidden;border-radius:14px;pointer-events:none;
  -webkit-mask-image:linear-gradient(180deg,transparent 0,#000 14%,#000 52%,transparent 88%);
          mask-image:linear-gradient(180deg,transparent 0,#000 14%,#000 52%,transparent 88%)}
.art .scene{position:absolute;inset:0;background:radial-gradient(120% 86% at 50% 16%,color-mix(in srgb,var(--gl-accent) 42%,#10151f),#0a0e15 72%)}
.art .bust{position:absolute;left:50%;top:8px;transform:translateX(-50%);font-size:118px;line-height:1;filter:drop-shadow(0 8px 22px rgba(0,0,0,.65))}
.art .scrim{position:absolute;inset:0;background:linear-gradient(0deg,rgba(2,5,8,.96),rgba(2,5,8,.2) 44%,transparent 66%)}

/* ===== the plate (compact info) ===== */
.plate{position:relative;z-index:3}

/* --- class tab (angled, two-tone) --- */
.tab{display:inline-flex;align-items:stretch;height:17px;margin-left:14px;font-family:var(--gl-tech);
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.5))}
.tab .cls{display:flex;align-items:center;gap:5px;padding:0 7px 0 9px;background:linear-gradient(180deg,#e7ddc4,#c9bd9c);
  color:#241d12;font-weight:800;font-size:9px;letter-spacing:.06em;text-transform:uppercase;
  clip-path:polygon(0 0,100% 0,calc(100% - 7px) 100%,0 100%)}
.tab .cls .lv{font-family:var(--gl-display);font-weight:800;font-size:12px;font-style:italic;line-height:1;
  color:#1a1206;transform:skewX(-8deg)}
.tab .anc{display:flex;align-items:center;padding:0 9px 0 11px;margin-left:-6px;background:linear-gradient(180deg,#1a2230,#0c1119);
  color:var(--gl-text-dim);font-weight:700;font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;
  clip-path:polygon(7px 0,100% 0,100% 100%,0 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}

/* --- name pill (black, prominent) + hero pips + conditions --- */
.namebar{display:flex;align-items:center;gap:9px;margin:-2px 0 5px}
.name{display:inline-flex;align-items:center;gap:7px;height:30px;padding:0 14px 0 11px;border-radius:8px;
  clip-path:polygon(0 0,calc(100% - 9px) 0,100% 100%,0 100%);
  background:linear-gradient(180deg,rgba(8,11,17,.94),rgba(2,4,7,.96));
  box-shadow:0 6px 16px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.08),inset 0 0 0 1px var(--gl-hair);
  backdrop-filter:blur(8px)}
.name .bullet{color:var(--gl-accent);font-size:9px;filter:drop-shadow(0 0 5px color-mix(in srgb,var(--gl-accent) 70%,transparent))}
.name .nm{font-weight:800;font-size:18px;line-height:1;letter-spacing:.2px;color:#fff;white-space:nowrap;
  text-shadow:0 1px 2px rgba(0,0,0,.7)}

.hero{display:flex;align-items:center;gap:4px}
.hero .pip{width:10px;height:10px;border-radius:50%;
  background:radial-gradient(circle at 38% 34%,rgba(255,255,255,.12),rgba(0,0,0,.4));
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.14);transition:.4s var(--gl-pop)}
.hero .pip.on{background:radial-gradient(circle at 38% 34%,var(--gl-signal-hot),color-mix(in srgb,var(--gl-signal) 60%,#7a5400));
  box-shadow:0 0 9px color-mix(in srgb,var(--gl-signal) 75%,transparent),inset 0 0 0 1px color-mix(in srgb,var(--gl-signal-hot) 80%,transparent)}
.hero .pip.flare{animation:pipflare .6s var(--gl-pop)}
@keyframes pipflare{0%{transform:scale(.4)}55%{transform:scale(1.4);filter:brightness(1.8)}100%{transform:none}}

.dying{display:none;align-items:center;gap:3px}
.unit.is-dying .dying{display:inline-flex}.unit.is-dying .hero{display:none}
.dying .dlbl{font-family:var(--gl-tech);font-weight:800;font-size:7.5px;letter-spacing:.16em;color:var(--gl-hazard);text-transform:uppercase}
.dying .sk{font-size:10px;line-height:1;opacity:.3;filter:grayscale(1)}
.dying .sk.on{opacity:1;filter:none;text-shadow:0 0 8px color-mix(in srgb,var(--gl-hazard) 80%,transparent)}

.conds{display:flex;gap:4px;margin-left:auto}
.cond{display:inline-flex;align-items:center;gap:3px;height:18px;padding:0 7px;border-radius:99px;
  font-family:var(--gl-tech);font-weight:700;font-size:8px;letter-spacing:.03em;text-transform:uppercase;
  color:var(--gl-signal-hot);
  background:linear-gradient(180deg,color-mix(in srgb,var(--gl-signal) 20%,rgba(8,11,17,.85)),color-mix(in srgb,var(--gl-signal) 6%,rgba(2,4,7,.9)));
  border:1px solid color-mix(in srgb,var(--gl-signal) 32%,transparent);backdrop-filter:blur(8px);
  animation:condIn .42s var(--gl-snap) backwards}
.cond .v{font-weight:800;color:#fff;background:color-mix(in srgb,var(--gl-signal) 55%,#5a3d00);border-radius:99px;padding:0 4px;font-size:7.5px}
.cond.bad{color:#ffd9d4;background:linear-gradient(180deg,color-mix(in srgb,var(--gl-hazard) 22%,rgba(8,11,17,.85)),color-mix(in srgb,var(--gl-hazard) 7%,rgba(2,4,7,.9)));
  border-color:color-mix(in srgb,var(--gl-hazard) 36%,transparent)}
.cond.bad .v{background:color-mix(in srgb,var(--gl-hazard) 60%,#400)}
.cond.persist{animation:condIn .42s var(--gl-snap) backwards,dread 3.2s ease-in-out infinite}
@keyframes condIn{from{opacity:0;transform:translateY(-5px) scale(.8)}to{opacity:1;transform:none}}
@keyframes dread{0%,100%{filter:brightness(1)}50%{filter:brightness(1.35)}}

/* --- the horizontal stat band (glass) --- */
.band{position:relative;display:flex;align-items:stretch;gap:0;height:54px;border-radius:11px;overflow:hidden;isolation:isolate;
  clip-path:polygon(0 0,calc(100% - 11px) 0,100% 11px,100% 100%,0 100%);
  background:
    linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,0) 36%),
    linear-gradient(98deg,color-mix(in srgb,var(--gl-accent) 13%,rgba(8,11,17,.82)),rgba(6,9,14,.86) 66%);
  border:1px solid var(--gl-edge);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.14),inset 0 -10px 22px rgba(0,0,0,.4);
  filter:drop-shadow(0 14px 26px rgba(0,0,0,.5));
  backdrop-filter:blur(14px) saturate(1.12)}
.band::after{content:"";position:absolute;top:-1px;right:-1px;width:16px;height:1px;z-index:6;
  background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--gl-accent) 88%,#fff));
  transform-origin:100% 0;transform:rotate(45deg) translateX(1px);box-shadow:0 0 7px color-mix(in srgb,var(--gl-accent) 70%,transparent);opacity:.9}
.seg{display:flex;flex-direction:column;justify-content:center;padding:0 11px;position:relative;z-index:2}
.seg + .seg::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:1px;
  background:linear-gradient(180deg,transparent,var(--gl-hair) 20%,var(--gl-hair) 80%,transparent)}

/* HP segment */
.seg.hp{min-width:128px}
.hp .top{display:flex;align-items:baseline;gap:4px}
.hp .pilllbl{font-family:var(--gl-tech);font-weight:800;font-size:8px;letter-spacing:.1em;color:#cdd6e8;
  background:rgba(0,0,0,.5);border-radius:99px;padding:2px 6px;align-self:center}
.hp .cur{font-weight:800;font-size:21px;line-height:1;color:var(--gl-text-bright);text-shadow:0 0 12px color-mix(in srgb,var(--gl-good) 38%,transparent)}
.hp .max{font-weight:700;font-size:11px;color:var(--gl-text-dim)}.hp .max::before{content:"/";color:var(--gl-text-faint);margin-right:1px}
.bar{position:relative;height:6px;margin-top:5px;border-radius:99px;overflow:hidden;
  background:linear-gradient(180deg,rgba(0,0,0,.5),rgba(0,0,0,.28));box-shadow:inset 0 0 0 1px rgba(255,255,255,.05)}
.bar .fill{position:absolute;inset:0;width:72%;border-radius:99px;
  background:linear-gradient(90deg,color-mix(in srgb,var(--gl-good) 75%,#0a0),var(--gl-good));
  box-shadow:0 0 9px color-mix(in srgb,var(--gl-good) 55%,transparent);transition:width .6s var(--gl-pop),background .5s,box-shadow .5s}
.bar .fill.warn{background:linear-gradient(90deg,#caa23a,var(--gl-signal));box-shadow:0 0 9px color-mix(in srgb,var(--gl-signal) 55%,transparent)}
.bar .fill.crit{background:linear-gradient(90deg,#b3343a,var(--gl-hazard));box-shadow:0 0 11px color-mix(in srgb,var(--gl-hazard) 60%,transparent)}

/* defense segment: AC shield + Perception d20 */
.seg.def{flex-direction:row;align-items:center;gap:10px}
.stat-ico{position:relative;width:34px;height:38px;display:grid;place-items:center;text-align:center}
.stat-ico .bg{position:absolute;inset:0;font-size:37px;line-height:38px}
.stat-ico.ac .bg{color:color-mix(in srgb,var(--gl-accent) 26%,transparent)}
.stat-ico.per .bg{color:color-mix(in srgb,var(--gl-signal) 30%,transparent)}
.stat-ico .val{position:relative;font-weight:800;font-size:16px;line-height:1;color:var(--gl-text-bright);text-shadow:0 1px 2px #000}
.stat-ico .k{position:relative;font-family:var(--gl-tech);font-weight:800;font-size:6px;letter-spacing:.14em;color:var(--gl-text-dim);margin-top:1px}

/* abilities: single horizontal row of 6 */
.seg.abil{flex:1;flex-direction:row;align-items:center;gap:0;padding:0 6px;justify-content:space-between}
.ab{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1}
.ab .k{font-family:var(--gl-tech);font-weight:800;font-size:6.5px;letter-spacing:.04em;color:var(--gl-text-faint)}
.ab .v{font-weight:800;font-size:13px;line-height:1;color:var(--gl-text)}
.ab .m{font-family:var(--gl-tech);font-weight:700;font-size:6px;color:color-mix(in srgb,var(--gl-accent) 40%,#fff)}

/* --- spell strip + shield + focus --- */
.strip{display:flex;align-items:center;gap:10px;margin-top:5px;padding:0 4px;height:18px;font-family:var(--gl-tech)}
.strip .ico{font-size:10px;color:var(--gl-violet);filter:drop-shadow(0 0 5px color-mix(in srgb,var(--gl-violet) 60%,transparent))}
.slots{display:flex;gap:7px}
.slk{display:flex;flex-direction:column;align-items:center;line-height:1}
.slk .o{font-weight:700;font-size:6px;letter-spacing:.04em;color:var(--gl-text-faint)}
.slk .pips{display:flex;gap:2px;margin-top:2px}
.slk .sp{width:6px;height:6px;border-radius:2px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(0,0,0,.35));box-shadow:inset 0 0 0 1px rgba(255,255,255,.07)}
.slk .sp.on{background:linear-gradient(180deg,color-mix(in srgb,var(--gl-violet) 90%,#fff),var(--gl-violet));box-shadow:0 0 6px color-mix(in srgb,var(--gl-violet) 60%,transparent)}
.focus{display:flex;align-items:center;gap:4px;margin-left:2px}
.focus .fl{font-weight:800;font-size:7px;letter-spacing:.1em;color:var(--gl-cyan)}
.focus .sp.on{background:linear-gradient(180deg,#fff,var(--gl-cyan));box-shadow:0 0 6px color-mix(in srgb,var(--gl-cyan) 60%,transparent)}
.shieldchip{display:none;align-items:center;gap:4px;margin-left:auto;font-weight:700;font-size:8px;letter-spacing:.06em;color:var(--gl-cyan)}
.unit.raised .shieldchip{display:inline-flex}
.shieldchip .v{color:var(--gl-text);opacity:.8}
.rw{display:flex;gap:4px;margin-left:auto}
.rw .t{font-family:var(--gl-tech);font-weight:700;font-size:7px;letter-spacing:.04em;text-transform:uppercase;color:var(--gl-text-dim)}
.rw .t b{color:var(--gl-good)} .rw .t.weak b{color:var(--gl-hazard)}

/* --- player token + handle (rotated-diamond frame) --- */
.who{position:absolute;left:-2px;bottom:-6px;display:flex;align-items:center;gap:7px;z-index:5}
.who .tok{width:30px;height:30px;transform:rotate(45deg);border-radius:6px;overflow:hidden;flex:none;
  background:linear-gradient(180deg,var(--gl-ink-3),var(--gl-ink-1));
  border:1px solid color-mix(in srgb,var(--gl-accent) 50%,var(--gl-edge));
  box-shadow:0 4px 12px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.08)}
.who .tok span{display:grid;place-items:center;width:100%;height:100%;transform:rotate(-45deg);font-size:16px}
.who .handle{font-family:var(--gl-tech);font-weight:700;font-size:8.5px;letter-spacing:.1em;color:var(--gl-text-dim);
  background:rgba(2,4,7,.7);border-radius:99px;padding:3px 9px;backdrop-filter:blur(6px)}

/* hazard state */
.unit.hazard{--gl-accent:var(--gl-hazard)}
.unit.hazard .band{animation:bandDread 3.2s ease-in-out infinite}
@keyframes bandDread{0%,100%{box-shadow:inset 0 1px 0 rgba(255,255,255,.14),inset 0 -10px 22px rgba(0,0,0,.4),inset 0 0 0 1px color-mix(in srgb,var(--gl-hazard) 0%,transparent)}
  50%{box-shadow:inset 0 1px 0 rgba(255,255,255,.14),inset 0 -10px 22px rgba(0,0,0,.4),inset 0 0 18px color-mix(in srgb,var(--gl-hazard) 24%,transparent)}}

/* --- THE BIG ROLL — degree-of-success flash over the band --- */
.roll{position:absolute;inset:0;z-index:20;display:grid;place-items:center;pointer-events:none;opacity:0;border-radius:11px;
  clip-path:polygon(0 0,calc(100% - 11px) 0,100% 11px,100% 100%,0 100%)}
.unit.rolling .roll{animation:rollShow 2.6s var(--gl-ease) forwards}
@keyframes rollShow{0%{opacity:0}7%{opacity:1}82%{opacity:1}100%{opacity:0}}
.roll .veil{position:absolute;inset:0;background:radial-gradient(130% 120% at 50% 50%,color-mix(in srgb,var(--roll-c) 36%,transparent),rgba(2,5,8,.82) 72%)}
.roll .sweep{position:absolute;top:0;bottom:0;width:46%;background:linear-gradient(100deg,transparent,color-mix(in srgb,var(--roll-c) 72%,#fff),transparent);transform:translateX(-160%) skewX(-12deg)}
.unit.rolling .roll .sweep{animation:rollSweep 2.6s var(--gl-ease)}
@keyframes rollSweep{0%,5%{transform:translateX(-160%) skewX(-12deg);opacity:0}9%{opacity:1}38%{transform:translateX(260%) skewX(-12deg);opacity:0}100%{transform:translateX(260%) skewX(-12deg);opacity:0}}
.roll .inner{position:relative;display:flex;align-items:center;gap:11px}
.roll .total{font-weight:800;font-size:34px;line-height:1;color:#fff;text-shadow:0 0 20px color-mix(in srgb,var(--roll-c) 80%,transparent)}
.roll .txt{display:flex;flex-direction:column;gap:2px}
.roll .deg{font-family:var(--gl-tech);font-weight:800;font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--roll-c);text-shadow:0 0 10px color-mix(in srgb,var(--roll-c) 80%,transparent)}
.roll .check{font-family:var(--gl-tech);font-weight:700;font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gl-text-dim)}
.roll.critsuccess{--roll-c:var(--gl-signal)} .roll.success{--roll-c:var(--gl-good)} .roll.failure{--roll-c:#8893a6} .roll.critfail{--roll-c:var(--gl-hazard)}

.unit.down{filter:saturate(.18) brightness(.62);opacity:.66}

/* harness chrome */
.dock{position:fixed;top:14px;left:14px;display:flex;gap:8px;flex-wrap:wrap;z-index:99}
.dock button{font:700 10px/1 var(--gl-tech);letter-spacing:.08em;text-transform:uppercase;color:#cdd6e8;
  background:rgba(255,255,255,.06);border:1px solid var(--gl-edge);border-radius:7px;padding:7px 11px;cursor:pointer}
.dock button:hover{background:rgba(255,255,255,.13);color:#fff}
.note{position:fixed;bottom:8px;right:12px;font-family:var(--gl-tech);font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--gl-text-faint);z-index:99}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}
</style>
</head>
<body>
<div class="dock">
  <button onclick="document.body.classList.toggle('is-transparent')">Toggle BG</button>
  <button onclick="dmg('sable')">Damage Wizard</button>
  <button onclick="bigRoll('lyra')">Big Roll (Cleric)</button>
  <button onclick="addCond('vex')">Add Condition</button>
  <button onclick="spendHero('lyra')">Spend Hero Pt</button>
  <button onclick="heal('sable')">Heal Wizard</button>
</div>
<div class="rail" id="rail"></div>
<div class="note">OBS BROWSER SOURCE · 1920×1080 · TRANSPARENT · COMPACT</div>

<script>
const PARTY=[
 {id:"thorne",accent:"#e0a368",bust:"🛡️",name:"Thorne Ironclad",player:"Marcus",ptok:"⚔️",
  cls:"Fighter",lvl:7,anc:"Dwarf",hp:{cur:98,max:112},ac:25,per:"+13",raised:true,shieldHp:"24/40",heroes:2,heroMax:3,
  abil:{Str:5,Dex:2,Con:4,Int:0,Wis:1,Cha:1},conds:[],rw:[{k:"Res",v:"fire 5"}],spells:null,focus:null},
 {id:"sable",accent:"#b884d0",bust:"🧙",name:"Sable Vexpar",player:"Aria",ptok:"🔮",
  cls:"Wizard",lvl:7,anc:"Elf",hp:{cur:31,max:64},ac:21,per:"+12",raised:false,heroes:1,heroMax:3,dying:0,
  abil:{Str:0,Dex:3,Con:1,Int:5,Wis:2,Cha:1},conds:[{t:"Frightened",v:2,bad:true},{t:"Fire",v:3,persist:true}],
  rw:[{k:"Weak",v:"cold 5",weak:true}],spells:[{rk:"4",on:1,max:2},{rk:"3",on:0,max:3},{rk:"2",on:2,max:3}],focus:null},
 {id:"lyra",accent:"#6fb8d8",bust:"⛪",name:"Lyra Dawnbringer",player:"Sam",ptok:"✨",
  cls:"Cleric",lvl:7,anc:"Human",hp:{cur:72,max:78},ac:23,per:"+14",raised:false,heroes:3,heroMax:3,
  abil:{Str:1,Dex:1,Con:3,Int:0,Wis:5,Cha:2},conds:[],rw:[],spells:[{rk:"4",on:2,max:2},{rk:"3",on:1,max:3}],focus:{on:2,max:3}},
 {id:"vex",accent:"#5fdb92",bust:"🗡️",name:"Vex Quickfingers",player:"Jordan",ptok:"🎭",
  cls:"Rogue",lvl:7,anc:"Halfling",hp:{cur:58,max:84},ac:24,per:"+15",raised:false,heroes:0,heroMax:3,
  abil:{Str:1,Dex:5,Con:2,Int:2,Wis:1,Cha:3},conds:[{t:"Clumsy",v:1,bad:true}],rw:[],spells:null,focus:null},
];
const sgn=n=>(n>=0?"+":"")+n, score=m=>10+m*2;

function unit(p){
 const pct=Math.round(p.hp.cur/p.hp.max*100), hpc=pct<=25?"crit":pct<=50?"warn":"", hz=pct<=33||p.dying;
 const heroPips=Array.from({length:p.heroMax},(_,i)=>`<span class="pip ${i<p.heroes?'on':''}"></span>`).join("");
 const dying=`<div class="dying"><span class="dlbl">Dying</span>${Array.from({length:4},(_,i)=>`<span class="sk ${i<(p.dying||0)?'on':''}">💀</span>`).join("")}</div>`;
 const ab=Object.entries(p.abil).map(([k,m])=>`<div class="ab"><span class="k">${k.toUpperCase()}</span><span class="v">${score(m)}</span><span class="m">${sgn(m)}</span></div>`).join("");
 const conds=p.conds.map(c=>`<span class="cond ${c.bad?'bad':''} ${c.persist?'persist':''}">${c.t}${c.v?`<span class="v">${c.v}</span>`:""}</span>`).join("");
 let strip=`<div class="strip">`;
 if(p.spells||p.focus){
   strip+=`<span class="ico">✦</span><span class="slots">`;
   (p.spells||[]).forEach(s=>{strip+=`<span class="slk"><span class="o">${s.rk}${s.rk=="1"?"ST":s.rk=="2"?"ND":s.rk=="3"?"RD":"TH"}</span><span class="pips">${Array.from({length:s.max},(_,i)=>`<span class="sp ${i<s.on?'on':''}"></span>`).join("")}</span></span>`;});
   strip+=`</span>`;
   if(p.focus)strip+=`<span class="focus"><span class="fl">◆</span><span class="pips">${Array.from({length:p.focus.max},(_,i)=>`<span class="sp ${i<p.focus.on?'on':''}"></span>`).join("")}</span></span>`;
 }
 if(p.raised)strip+=`<span class="shieldchip">🛡 RAISED <span class="v">${p.shieldHp||""}</span></span>`;
 if(p.rw.length)strip+=`<span class="rw">${p.rw.map(t=>`<span class="t ${t.weak?'weak':''}">${t.k} <b>${t.v}</b></span>`).join("")}</span>`;
 strip+=`</div>`;

 return `<div class="unit ${hz?'hazard':''} ${p.raised?'raised':''} ${p.dying?'is-dying':''}" id="u-${p.id}" style="--gl-accent:${p.accent}">
   <div class="art"><div class="scene"></div><div class="bust">${p.bust}</div><div class="scrim"></div></div>
   <div class="plate">
     <div class="tab"><span class="cls">${p.cls}<span class="lv">${p.lvl}</span></span><span class="anc">${p.anc}</span></div>
     <div class="namebar">
       <span class="name"><span class="bullet">▶</span><span class="nm">${p.name}</span></span>
       <div class="hero">${heroPips}</div>${dying}
       <div class="conds">${conds}</div>
     </div>
     <div class="band">
       <div class="seg hp">
         <div class="top"><span class="pilllbl">HP</span><span class="cur" data-cur>${p.hp.cur}</span><span class="max">${p.hp.max}</span></div>
         <div class="bar"><div class="fill ${hpc}" data-fill style="width:${pct}%"></div></div>
       </div>
       <div class="seg def">
         <div class="stat-ico ac"><span class="bg">⬣</span><span class="val">${p.ac}</span><span class="k">AC</span></div>
         <div class="stat-ico per"><span class="bg">⬢</span><span class="val">${p.per}</span><span class="k">PER</span></div>
       </div>
       <div class="seg abil">${ab}</div>
       <div class="roll" data-roll><div class="veil"></div><div class="sweep"></div>
         <div class="inner"><div class="total" data-total></div><div class="txt"><div class="deg" data-deg></div><div class="check" data-check></div></div></div></div>
     </div>
     ${strip}
     <div class="who"><span class="tok"><span>${p.ptok}</span></span><span class="handle">${p.player}</span></div>
   </div>
 </div>`;
}
function paint(){document.getElementById("rail").innerHTML=PARTY.map(unit).join("")}
paint();

/* ---- simulated live updates ---- */
function setHp(id,delta){
 const p=PARTY.find(x=>x.id===id); p.hp.cur=Math.max(0,Math.min(p.hp.max,p.hp.cur+delta));
 const u=document.getElementById("u-"+id), f=u.querySelector("[data-fill]"), n=u.querySelector("[data-cur]");
 const pct=Math.round(p.hp.cur/p.hp.max*100);
 f.style.width=pct+"%"; f.className="fill "+(pct<=25?"crit":pct<=50?"warn":""); n.textContent=p.hp.cur;
 const col=delta<0?"#ff7a6f":"#9affc0";
 n.animate([{transform:"scale(1.5)",color:col},{transform:"scale(1)",color:"#f3fbff"}],{duration:600,easing:"cubic-bezier(.34,1.56,.5,1)"});
 u.classList.toggle("hazard",pct<=33||!!p.dying);
}
function dmg(id){setHp(id,-14);const u=document.getElementById("u-"+id);u.animate([{transform:"translateX(0)"},{transform:"translateX(-5px)"},{transform:"translateX(5px)"},{transform:"translateX(0)"}],{duration:240});}
function heal(id){setHp(id,+18);}
function bigRoll(id){
 const u=document.getElementById("u-"+id),r=u.querySelector("[data-roll]");
 const o=[["critsuccess","CRITICAL SUCCESS",34],["success","SUCCESS",27],["failure","FAILURE",14],["critfail","CRITICAL FAILURE",6]][Math.floor(Math.random()*4)];
 r.className="roll "+o[0]; r.querySelector("[data-deg]").textContent=o[1]; r.querySelector("[data-total]").textContent=o[2];
 r.querySelector("[data-check]").textContent="Religion · Recall Knowledge";
 u.classList.remove("rolling");void u.offsetWidth;u.classList.add("rolling");
}
function addCond(id){const p=PARTY.find(x=>x.id===id);p.conds.push({t:"Off-Guard",bad:true});
 document.querySelector("#u-"+id+" .conds").insertAdjacentHTML("beforeend",`<span class="cond bad">Off-Guard</span>`);}
function spendHero(id){const p=PARTY.find(x=>x.id===id);if(p.heroes<=0)return;
 const on=document.querySelectorAll("#u-"+id+" .hero .pip.on");const last=on[on.length-1];
 last.classList.remove("on");last.classList.add("flare");setTimeout(()=>last.classList.remove("flare"),600);p.heroes--;}

let t=0;setInterval(()=>{t++;if(t%6===2)bigRoll("lyra");if(t%6===4)dmg("sable");if(t%6===5)heal("sable");},4200);
</script>
</body>
</html>
