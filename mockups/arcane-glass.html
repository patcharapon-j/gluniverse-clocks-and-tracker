<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arcane Glass HUD — Tactile Top Bar</title>
<style>
  :root{
    --ink:#eef1f7; --muted:#98a2b6; --hair:rgba(255,255,255,.08);
    --tint:#6b86d6; --tint2:#1a2233; --glow:rgba(120,150,225,.5); --glowsoft:rgba(120,150,225,.18);
    --edge:rgba(255,255,255,.13);
    --raise:linear-gradient(180deg,#2b3340,#1b212c);
    --raise2:linear-gradient(180deg,#333c4b,#222a36);
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{font:14px/1.45 "Segoe UI",system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(1100px 700px at 50% -5%, #1b2336, transparent 55%),
      radial-gradient(900px 500px at 82% 112%, #221731, transparent 60%), #06080c;
    -webkit-font-smoothing:antialiased;padding:18px 0 90px;}
  h1{font-size:18px;font-weight:650;margin:0;text-align:center}
  .hint{color:var(--muted);font-size:12.5px;max-width:720px;text-align:center;margin:6px auto 0}
  .hint b{color:#cdd6e6} .hint kbd{background:#1a2030;border:1px solid var(--hair);border-radius:5px;padding:0 5px;font:600 11px/1.6 inherit;color:#cdd6e6}
  .deck{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin:16px auto 0}
  .tgl{border:1px solid var(--hair);background:#161b25;color:var(--ink);padding:7px 12px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer}
  .tgl:hover{background:#1e2533} .tgl.active{background:var(--tint);border-color:transparent;box-shadow:0 0 16px var(--glowsoft)}
  .screen{position:relative;width:min(1280px,97vw);height:160px;margin:26px auto 0;border-radius:12px;
    border:1px dashed rgba(255,255,255,.10);background:repeating-linear-gradient(135deg,rgba(255,255,255,.014) 0 14px,transparent 14px 28px);
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:14px;}
  .screen .label{position:absolute;bottom:8px;right:12px;color:#3b4254;font-size:11px;letter-spacing:.18em}

  /* ========== BAR: stacked rows for player/GM consistency ========== */
  .bar{position:relative;width:min(940px,95%);margin:12px auto 0;border-radius:15px;overflow:hidden;isolation:isolate;
    background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,0) 34%),
      linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.20)),
      linear-gradient(98deg, var(--tint2), #080b11 64%);
    border:1px solid var(--edge);
    box-shadow:0 26px 70px rgba(0,0,0,.6), 0 2px 0 rgba(0,0,0,.4),
      inset 0 1px 0 rgba(255,255,255,.16), inset 0 -12px 28px rgba(0,0,0,.38), 0 0 46px var(--glowsoft);
    backdrop-filter:blur(16px) saturate(1.15);
    transition:background 1s ease, box-shadow 1s ease, width .35s cubic-bezier(.4,0,.2,1);}
  .bar::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:1;
    background:radial-gradient(70% 150% at 50% -50%, var(--glow), transparent 66%);opacity:.22;transition:1s}
  .sweep{position:absolute;top:0;bottom:0;width:38%;z-index:4;pointer-events:none;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.14),transparent);
    transform:translateX(-160%) skewX(-12deg);opacity:0}
  .bar.swept .sweep{animation:sweep 1s cubic-bezier(.4,0,.2,1)}
  @keyframes sweep{0%{transform:translateX(-160%) skewX(-12deg);opacity:0}18%{opacity:1}100%{transform:translateX(300%) skewX(-12deg);opacity:0}}

  /* main info row */
  .main{display:flex;align-items:stretch;height:48px;position:relative;z-index:2}
  .cell{display:flex;flex-direction:column;justify-content:center;padding:0 12px;position:relative;gap:2px}
  .cell + .cell::before{content:"";position:absolute;left:0;top:11px;bottom:11px;width:1px;
    background:linear-gradient(180deg,transparent,var(--hair) 22%,var(--hair) 78%,transparent)}
  .lbl{font-size:7.5px;letter-spacing:.22em;text-transform:uppercase;color:#69748c;font-weight:700}
  .grip{width:20px;justify-content:center;align-items:center;flex-direction:row;gap:3px;cursor:grab}
  .grip i{width:3px;height:3px;border-radius:99px;background:rgba(255,255,255,.22);transition:.3s}
  .bar:hover .grip i{background:rgba(255,255,255,.42)}

  .date{padding-left:10px}
  .date .wd{font-size:8px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted)}
  .date .m{font-size:16px;font-weight:760;letter-spacing:.2px;line-height:1.05;white-space:nowrap;
    background:linear-gradient(180deg,#fff,#ccd5e8);-webkit-background-clip:text;background-clip:text;color:transparent}
  .date .m sup{font-size:8px;font-weight:600;-webkit-text-fill-color:var(--muted)}
  .date .mo{font-size:9.5px;color:#aab4c8;white-space:nowrap}

  .watch .name{font-size:12.5px;font-weight:740;letter-spacing:.05em;white-space:nowrap;text-shadow:0 0 14px var(--glowsoft)}
  .watch .row{display:flex;align-items:center;gap:8px;margin-top:3px}
  /* day-quarter tracker: future=hollow, past=solid, current=wide cell with inner stretch fill */
  .shifts{display:flex;gap:4px;align-items:center}
  .shifts .s{width:9px;height:9px;border-radius:3px;border:1.5px solid rgba(255,255,255,.22);background:transparent;
    position:relative;overflow:hidden;transition:width .5s cubic-bezier(.34,1.3,.4,1),background .4s,border-color .4s}
  .shifts .s.done{background:rgba(255,255,255,.3);border-color:transparent}
  .shifts .s.on{width:34px;border-color:transparent;background:rgba(255,255,255,.08);box-shadow:0 0 10px var(--glow)}
  .shifts .s.on::after{content:"";position:absolute;inset:0;width:var(--fill,0%);
    background:linear-gradient(90deg,var(--tint),color-mix(in srgb,var(--tint) 70%,#fff));
    box-shadow:0 0 8px var(--glow);transition:width .4s ease}
  .moon{position:relative;width:12px;height:12px;border-radius:50%;overflow:hidden;
    background:radial-gradient(circle at 38% 34%,#eef2fb,#a9b5ce);box-shadow:0 0 8px rgba(207,216,234,.4),inset -2px -2px 3px rgba(0,0,0,.25)}
  .moon .shadow{position:absolute;top:-1px;height:14px;width:14px;border-radius:50%;background:#0a0d13;transition:left .7s cubic-bezier(.4,0,.2,1)}
  .season{font-size:9px;color:var(--muted);white-space:nowrap}

  /* meter — clean flat pips, active hour expands to squares */
  .meter{flex:1 1 auto;min-width:220px;max-width:320px;justify-content:center;padding:0 13px}
  .meter .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
  .clock{font-variant-numeric:tabular-nums;font-size:13px;font-weight:700;letter-spacing:.04em;display:flex;align-items:center;gap:6px}
  /* slot-reel clock: each digit is its own vertical wheel that rotates in place */
  .reelclock{display:inline-flex;align-items:center;height:1.18em;line-height:1.18em;font-variant-numeric:tabular-nums}
  .reelclock .reel{display:inline-block;height:1.18em;width:.6em;overflow:hidden;text-align:center}
  .reelclock .reel .strip{display:flex;flex-direction:column;will-change:transform;
    transition:transform .52s cubic-bezier(.2,.85,.22,1);transition-delay:var(--rd,0s)}
  .reelclock .reel .strip span{height:1.18em;line-height:1.18em}
  .reelclock .colon{width:.32em;text-align:center;opacity:.8}
  .clock .pulse{width:5px;height:5px;border-radius:99px;background:var(--tint);box-shadow:0 0 8px var(--glow);animation:bp 2.6s ease-in-out infinite}
  @keyframes bp{0%,100%{opacity:.4}50%{opacity:1}}
  .rem{font-size:8px;color:#69748c;letter-spacing:.12em;text-transform:uppercase;font-weight:700}
  .track{display:flex;gap:6px;align-items:center;height:18px}
  .hourgrp{display:flex;gap:3px;flex-grow:1;flex-basis:0;align-items:center;
    transition:flex-grow .45s cubic-bezier(.34,1.2,.4,1)}
  .hourgrp.curr{flex-grow:2.6}                /* active hour widens → its pips become squares */
  .pip{flex:1;height:14px;border-radius:2px;background:rgba(255,255,255,.12);
    transition:background .35s ease, box-shadow .35s ease}
  .pip.fill{background:var(--tint);box-shadow:0 0 5px var(--glowsoft)}   /* passed = shift colour */
  .pip.head{background:#fff;box-shadow:0 0 10px rgba(255,255,255,.9)}
  .pip.pop{animation:pop .5s cubic-bezier(.34,1.56,.5,1)}                /* one-shot pop on activate */
  @keyframes pop{0%{transform:scaleY(.5);opacity:.4}45%{transform:scaleY(1.32);opacity:1;box-shadow:0 0 20px #fff}100%{transform:scaleY(1)}}

  .event-cell{justify-content:center;max-width:180px}
  .event{font-size:9.5px;color:#ffe6b5;background:linear-gradient(180deg,rgba(255,196,84,.16),rgba(255,196,84,.05));
    border:1px solid rgba(255,196,84,.30);border-radius:99px;padding:4px 9px;display:flex;gap:5px;align-items:center;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:inset 0 1px 0 rgba(255,255,255,.1)}
  .event .dot{width:5px;height:5px;border-radius:99px;background:#ffc454;box-shadow:0 0 9px #ffc454;flex:none}
  .event.today{background:linear-gradient(180deg,rgba(255,196,84,.26),rgba(255,196,84,.09));box-shadow:0 0 16px rgba(255,196,84,.28)}

  /* small concise GM control dock — detached, floats just beneath the bar */
  .gmdock{display:inline-flex;gap:3px;margin:7px auto 0;padding:3px;border-radius:10px;
    background:linear-gradient(180deg,rgba(22,27,37,.92),rgba(14,18,26,.92));
    border:1px solid var(--hair);box-shadow:0 8px 22px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08);
    backdrop-filter:blur(10px);transition:opacity .3s ease}
  .gmwrap{display:flex;justify-content:center}
  .c{font-size:10.5px;font-weight:650;padding:5px 9px;border-radius:7px;cursor:pointer;white-space:nowrap;user-select:none;
    color:var(--ink);background:transparent;border:1px solid transparent;transition:background .12s,transform .1s,box-shadow .12s}
  .c:hover{background:rgba(255,255,255,.08);box-shadow:0 0 10px var(--glowsoft)}
  .c:active{transform:translateY(1px)}
  .c.rw{box-shadow:inset 0 0 0 1.5px rgba(255,140,120,.7)}
  .c.sep{color:var(--muted)}
  .player-hidden{display:none}

  /* ===== collapsed pill with shift+stretch ring ===== */
  .bar.collapsed{width:auto;min-width:0;display:inline-flex}
  .bar.collapsed .main{height:40px}
  .bar.collapsed .cell:not(.pill):not(.grip),.bar.collapsed .ctrlrow{display:none}
  .pill{display:none}
  .bar.collapsed .pill{display:flex;flex-direction:row;align-items:center;gap:11px;padding-right:15px}
  .pill .pw{font-size:11.5px;font-weight:740;letter-spacing:.04em;white-space:nowrap}
  .pill .pc{font-variant-numeric:tabular-nums;font-size:13.5px;font-weight:740}
  .pill .pd{font-size:10.5px;color:#aab4c8;white-space:nowrap}
  /* collapsed dual-ring: inner 4-quadrant shift pie + outer stretch squares (hour-gapped) */
  .pring{display:inline-flex;align-items:center;justify-content:center}
  .ring{display:block;overflow:visible}
  .ring .pie{fill:rgba(255,255,255,.06);stroke:rgba(255,255,255,.10);stroke-width:.4;transition:fill .55s ease,filter .55s ease}
  .ring .pie.on{fill:var(--tint);filter:drop-shadow(0 0 3px var(--glow))}
  .ring .hub{fill:#0a0e15;stroke:rgba(255,255,255,.14);stroke-width:.5}
  .ring .sq{transform-box:fill-box;transform-origin:50% 100%;fill:rgba(255,255,255,.14);
    transition:transform .42s cubic-bezier(.34,1.5,.5,1),fill .35s ease,filter .35s ease}
</style>
</head>
<body>
  <h1>Arcane Glass — Tactile Top Bar</h1>
  <p class="hint">Player &amp; GM share the same info row; GM gets the <b>control row beneath</b>. Increment buttons: <b>left-click +step</b>, <b><kbd>right-click</kbd> rewind</b>. Collapsed pill keeps a <b>shift+stretch ring</b>.</p>

  <div class="deck">
    <button class="tgl" onclick="advance(1)">+ Stretch</button>
    <button class="tgl" onclick="advance(6)">+ Hour</button>
    <button class="tgl" onclick="advance(36)">+ Shift</button>
    <button class="tgl" onclick="advance(144)">+ Day</button>
    <button class="tgl" id="playbtn" onclick="togglePlay()">▶ auto-play</button>
    <button class="tgl" id="colbtn" onclick="toggleCollapse()">collapse</button>
    <button class="tgl" id="viewbtn" onclick="toggleView()">player view</button>
  </div>

  <div class="screen"><span class="label">PLAY AREA / CANVAS</span>

    <div class="bar" id="bar">
      <div class="sweep"></div>
      <div class="main">
        <div class="cell grip" onclick="toggleCollapse()"><i></i><i></i><i></i></div>

        <div class="cell pill" onclick="toggleCollapse()">
          <span class="pring" data-ring></span>
          <span class="pw" data-watch></span>
          <span class="pc reelclock" data-reelclock></span><span class="pd" data-pilldate></span>
        </div>

        <div class="cell date">
          <span class="wd" data-wd></span>
          <span class="m"><span data-dy></span><sup data-ord></sup> <span data-moshort></span></span>
          <span class="mo" data-mo></span>
        </div>

        <div class="cell watch">
          <span class="name" data-watch></span>
          <span class="row"><span class="shifts" data-shifts></span>
            <span class="moon"><span class="shadow" data-moon></span></span>
            <span class="season" data-season></span></span>
        </div>

        <div class="cell meter">
          <div class="top"><span class="clock" id="clk"><span class="pulse"></span><span class="reelclock" data-reelclock></span></span>
            <span class="rem"><span data-rem></span> left</span></div>
          <div class="track" data-track></div>
        </div>

        <div class="cell event-cell">
          <span class="lbl">Calendar</span>
          <span class="event" data-event><span class="dot"></span><span data-eventtxt></span></span>
        </div>
      </div>
    </div>

    <div class="gmwrap" id="gmwrap">
      <div class="gmdock">
        <span class="c" data-step="1"   onclick="advance(1)">+Stretch</span>
        <span class="c" data-step="6"   onclick="advance(6)">+Hour</span>
        <span class="c" data-step="36"  onclick="advance(36)">+Shift</span>
        <span class="c" data-step="144" onclick="advance(144)">+Day</span>
        <span class="c sep" onclick="nextShift()">↪ Watch</span>
        <span class="c sep" title="Set exact date & time" onclick="alert('Opens set exact date & time dialog')">⌚</span>
      </div>
    </div>
  </div>

<script>
  const SPS=36,SHIFTS=4,SPD=144;let stretch=44,timer=null,prevShift=1;
  const WATCHES=[
    {name:"Night Watch",tint:"#6b86d6",tint2:"#1a2233",glow:"rgba(120,150,225,.5)",soft:"rgba(120,150,225,.18)"},
    {name:"Dawn Watch", tint:"#e0a368",tint2:"#2f2316",glow:"rgba(230,170,100,.5)",soft:"rgba(230,170,100,.18)"},
    {name:"Day Watch",  tint:"#6fb8d8",tint2:"#162a36",glow:"rgba(110,184,216,.5)",soft:"rgba(110,184,216,.18)"},
    {name:"Dusk Watch", tint:"#b884d0",tint2:"#241430",glow:"rgba(184,132,208,.5)",soft:"rgba(184,132,208,.18)"},
  ];
  const WEEKDAYS=["Moonday","Toilday","Wealday","Oathday","Fireday","Starday","Sunday"];
  const SEASONS=["Deep Winter","Thaw","High Sun","Harvest"];
  const EVENTS={14:"Festival of Night's Return"};

  const track=document.querySelector('[data-track]');
  for(let h=0;h<6;h++){const g=document.createElement('div');g.className='hourgrp';
    for(let p=0;p<6;p++){const e=document.createElement('div');e.className='pip';g.appendChild(e);}track.appendChild(g);}
  const shiftsRow=document.querySelector('[data-shifts]');
  for(let i=0;i<SHIFTS;i++){const d=document.createElement('span');d.className='s';shiftsRow.appendChild(d);}

  // build collapsed dual-ring (inner shift pie + outer hour-gapped stretch squares)
  const NS='http://www.w3.org/2000/svg';
  const svgEl=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
  const polar=(cx,cy,r,deg)=>{const a=(deg-90)*Math.PI/180;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];};
  const wedge=(cx,cy,r,a0,a1)=>{const[x0,y0]=polar(cx,cy,r,a0),[x1,y1]=polar(cx,cy,r,a1);
    const lg=a1-a0<=180?0:1;return `M${cx} ${cy} L${x0} ${y0} A${r} ${r} 0 ${lg} 1 ${x1} ${y1} Z`;};
  const ringPies=[],ringSqs=[];
  {const svg=svgEl('svg',{viewBox:'0 0 40 40',width:34,height:34,class:'ring'});
    for(let i=0;i<SHIFTS;i++){const p=svgEl('path',{d:wedge(20,20,8,i*90-45,(i+1)*90-45),class:'pie'});svg.appendChild(p);ringPies.push(p);}
    svg.appendChild(svgEl('circle',{cx:20,cy:20,r:2.3,class:'hub'}));
    const dpu=360/42,off=-90+dpu;                      // 36 squares + 6 hour-gaps worth of slots
    for(let i=0;i<SPS;i++){const ang=off+(i+Math.floor(i/6))*dpu;
      const g=svgEl('g',{transform:`translate(20 20) rotate(${ang})`});
      const rect=svgEl('rect',{x:-1.15,y:-13,width:2.3,height:3,rx:.6,class:'sq'});
      g.appendChild(rect);svg.appendChild(g);ringSqs.push(rect);}
    document.querySelector('[data-ring]').appendChild(svg);}

  // build slot-reel clocks (each digit a vertical wheel: 0-9 + a trailing 0 for clean wrap)
  function buildReel(){const r=document.createElement('span');r.className='reel';
    const s=document.createElement('span');s.className='strip';
    for(let n=0;n<=10;n++){const d=document.createElement('span');d.textContent=n%10;s.appendChild(d);}
    r.appendChild(s);r.dataset.cur='0';return r;}
  function buildClock(host){host.innerHTML='';host._reels=[];
    for(let i=0;i<4;i++){if(i===2){const c=document.createElement('span');c.className='colon';c.textContent=':';host.appendChild(c);}
      const r=buildReel();r.style.setProperty('--rd',(i*0.045)+'s');host.appendChild(r);host._reels.push(r);}}
  function setReel(r,d){const strip=r.firstChild,cur=+r.dataset.cur,curDigit=cur%10;
    if(d===curDigit&&cur<10)return;
    const target=(d===0&&curDigit!==0)?10:d;                   // wrap forward through duplicate 0
    strip.style.transform='translateY(-'+(target*(100/11))+'%)';r.dataset.cur=String(target);
    if(target===10){clearTimeout(r._t);r._t=setTimeout(()=>{strip.style.transition='none';
      strip.style.transform='translateY(0)';r.dataset.cur='0';void strip.offsetWidth;strip.style.transition='';},760);}}
  function setClock(host,str){const ds=str.replace(':','').split('').map(Number);
    host._reels.forEach((r,i)=>setReel(r,ds[i]));}
  const clocks=[...document.querySelectorAll('[data-reelclock]')];clocks.forEach(buildClock);

  const ord=n=>{const s=["th","st","nd","rd"],v=n%100;return s[(v-20)%10]||s[v]||s[0];};
  function advance(n){stretch=Math.max(0,stretch+n);render();}
  function nextShift(){advance(SPS-(stretch%SPS));}
  function togglePlay(){const b=document.getElementById('playbtn');
    if(timer){clearInterval(timer);timer=null;b.classList.remove('active');b.textContent='▶ auto-play';}
    else{timer=setInterval(()=>advance(1),650);b.classList.add('active');b.textContent='⏸ pause';}}
  function toggleCollapse(){const c=document.getElementById('bar').classList.toggle('collapsed');document.getElementById('colbtn').classList.toggle('active');
    const playerOn=document.getElementById('viewbtn').classList.contains('active');
    document.getElementById('gmwrap').style.display=(c||playerOn)?'none':'flex';}
  function toggleView(){const on=document.getElementById('viewbtn').classList.toggle('active');
    document.getElementById('gmwrap').style.display=on?'none':'flex';}
  function setAll(sel,txt){document.querySelectorAll(sel).forEach(e=>e.textContent=txt);}

  document.querySelectorAll('.c[data-step]').forEach(c=>{
    c.addEventListener('contextmenu',e=>{e.preventDefault();advance(-(+c.dataset.step));
      c.classList.add('rw');setTimeout(()=>c.classList.remove('rw'),420);});
    const lbl={1:'stretch',6:'hour',36:'shift',144:'day'}[c.dataset.step];
    c.title=`Left-click +1 ${lbl} · Right-click −1 ${lbl}`;
  });

  function render(){
    const dayOff=Math.floor(stretch/SPD),sOfDay=stretch%SPD;
    const shiftIdx=Math.floor(sOfDay/SPS),sInShift=sOfDay%SPS;
    const totMin=sOfDay*10,hh=Math.floor(totMin/60),mm=totMin%60;
    const w=WATCHES[shiftIdx],dayNum=14+dayOff,weekday=WEEKDAYS[(2+dayNum)%7];
    const clock=String(hh).padStart(2,'0')+":"+String(mm).padStart(2,'0');
    const r=document.documentElement.style;
    r.setProperty('--tint',w.tint);r.setProperty('--tint2',w.tint2);r.setProperty('--glow',w.glow);r.setProperty('--glowsoft',w.soft);

    if(shiftIdx!==prevShift){const bar=document.getElementById('bar');bar.classList.remove('swept');void bar.offsetWidth;bar.classList.add('swept');prevShift=shiftIdx;}

    setAll('[data-watch]',w.name);clocks.forEach(c=>setClock(c,clock));
    setAll('[data-wd]',weekday);setAll('[data-dy]',dayNum);setAll('[data-ord]',ord(dayNum));
    setAll('[data-moshort]','Calistril');setAll('[data-mo]','Calistril · 4724 AR');
    setAll('[data-pilldate]','· '+weekday+' '+dayNum);
    setAll('[data-rem]',(SPS-sInShift)+' stretches');
    setAll('[data-season]',SEASONS[Math.floor(((dayNum-1)%112)/28)]);
    const mphase=Math.floor(((dayNum)%28)/3.5);
    const sh=document.querySelector('[data-moon]');if(sh)sh.style.left=(((mphase)/7)*14-7)+'px';

    document.querySelectorAll('[data-shifts] .s').forEach((d,i)=>{
      d.classList.toggle('on',i===shiftIdx);d.classList.toggle('done',i<shiftIdx);
      if(i===shiftIdx)d.style.setProperty('--fill',(((sInShift+1)/SPS)*100)+'%');});
    let headPip=null;
    document.querySelectorAll('.hourgrp .pip').forEach((p,idx)=>{
      const dist=Math.abs(idx-sInShift);p.style.transitionDelay=(Math.min(dist,8)*22)+'ms';
      p.classList.toggle('fill',idx<sInShift);
      const isHead=idx===sInShift;p.classList.toggle('head',isHead);if(isHead)headPip=p;});
    if(headPip){headPip.classList.remove('pop');void headPip.offsetWidth;headPip.classList.add('pop');}
    document.querySelectorAll('.hourgrp').forEach((g,h)=>g.classList.toggle('curr',h===Math.floor(sInShift/6)));

    // collapsed dual-ring: inner pie = active shift, outer squares = stretches (active hour white+extended)
    ringPies.forEach((p,i)=>p.classList.toggle('on',i===shiftIdx));
    ringSqs.forEach((rect,idx)=>{
      const inHour=Math.floor(idx/6)===Math.floor(sInShift/6),passed=idx<sInShift,head=idx===sInShift;
      let k=1,fill='rgba(255,255,255,.14)',filt='none';
      if(head){k=2.9;fill='#fff';filt='drop-shadow(0 0 3.2px rgba(255,255,255,1))';}   // current stretch: tallest + pure white
      else if(inHour){k=1.55;fill=passed?'var(--tint)':'rgba(255,255,255,.22)';}        // active hour: tinted, only modestly raised
      else if(passed){k=1;fill='var(--tint)';}
      rect.style.transform='scaleY('+k+')';rect.style.fill=fill;rect.style.filter=filt;});

    const ev=EVENTS[dayNum],chip=document.querySelector('[data-event]');
    if(ev){chip.classList.add('today');setAll('[data-eventtxt]','Today: '+ev);}
    else{chip.classList.remove('today');const d=14-dayNum;
      setAll('[data-eventtxt]',d>0?`Next: Festival · ${d}d`:`Next: Equinox · ${(28-(dayNum%28))}d`);}
  }
  render();
</script>
</body>
</html>
