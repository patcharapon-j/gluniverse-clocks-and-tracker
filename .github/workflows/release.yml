name: Release

# Publish a Foundry-installable release. There are three ways to trigger this:
#   1. Manually from the Actions tab ("Run workflow") choosing a bump type
#      (patch / minor / major). The version in module.json is auto-incremented,
#      committed back, tagged, and released — no manual version editing needed.
#   2. Pushing a version tag ("x.y.z" / "vx.y.z"); the tag becomes the version.
#   3. Publishing a GitHub Release; its tag becomes the version.
#
# In every case the manifest at
#   https://github.com/<owner>/<repo>/releases/latest/download/module.json
# is updated so existing installs can auto-update from that link.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semantic version part to increment"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
  push:
    tags:
      - "*"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history + the branch ref so we can commit the bump back.
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Determine version & tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CURRENT="$(jq -r '.version' module.json)"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            MAJOR="${MAJOR:-0}"; MINOR="${MINOR:-0}"; PATCH="${PATCH:-0}"
            case "${{ github.event.inputs.bump }}" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            TAG="v${VERSION}"
          else
            TAG="${{ github.event.release.tag_name || github.ref_name }}"
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION (tag $TAG)"

      - name: Stamp version & URLs into module.json
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ steps.ver.outputs.tag }}"
          jq \
            --arg v   "${{ steps.ver.outputs.version }}" \
            --arg url "https://github.com/$REPO" \
            --arg man "https://github.com/$REPO/releases/latest/download/module.json" \
            --arg dl  "https://github.com/$REPO/releases/download/$TAG/module.zip" \
            '.version=$v | .url=$url | .manifest=$man | .download=$dl' \
            module.json > module.tmp.json && mv module.tmp.json module.json

      - name: Commit version bump & create tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add module.json
          git commit -m "chore(release): ${{ steps.ver.outputs.version }}"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Build module.zip
        run: zip -r module.zip module.json scripts styles templates lang

      - name: Publish release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            module.json
            module.zip
